<html>
    <head>
        <title>Me Game Profile</title>
        <style>
            
            body {
font-family: Arial, sans-serif;

background: aliceblue;

text-align: center;

padding: 30px;

}
h1 { color: navy; }
button {
background: navy;
color: white;
padding: 10px 25px;
border: none;
border-radius: 20px;
cursor: pointer;

}
div {
border: 1px solid navy;
width: 280px;
margin: 6px auto;
padding: 8px 12px;
text-align: left;
border-radius: 6px;
}

            </style>
    </head>
    <body>
        
       <h1>Me Game Profile</h1>
       <button onclick="showProfile()">Show Profile</button>
       <div>Name: <span id="name"></span></div>
       <div>Score: <span id="score"></span></div>
       <div>Top score: <span id="record"></span></div>
       <div>Rank: <span id="rank"></span></div>
       <div>Greetings: <span id="greetings"></span></div>
       <div>Stars: <span id="stars"></span></div>
       <div>Bonus Level: <span id="bonus"></span></div>
       <div>Team name: <span id="Team"></span></div>
       <script>


          function showProfile() {
            let name       ="Alex";
            let myScore    = 75;
            let highScore  = 100;
            let bonus      = null;
            let team;


            let isTopScore = myScore == highScore;

            let rank;
            if (myScore >=80) {
                rank="Gold";
            } else if (myScore >= 50) {
                rank = "Silver"
            } else {
                rank = "Bronze";
            }

            let hour = new Date().getHours();
            let Greeting;
            if (hour < 12) {
                greetings = "Good Morning!"
            } else if (hour <17) {
                greeting = "Good Afternoon!";
            } else {
                greeting = "Good Evening!";
            }

            let stars = "";
            let count =0;
            while (count < 5) {
                stars = stars + "* ";
                count = count + 1;
            }
            document.getElementById("name").innerHTML   =name;
            document.getElementById("score").innerHTML   =myScore + "out of" +
            highScore;
             document.getElementById("record").innerHTML   =isTopScore;
            document.getElementById("rank").innerHTML   =rank;
            document.getElementById("greeting").innerHTML   =greeting;
            document.getElementById("stars").innerHTML   =stars;
             document.getElementById("bonus").innerHTML   =bonus;
              document.getElementById("team").innerHTML   =team;

                  }
        </script>
    </body>
</html>

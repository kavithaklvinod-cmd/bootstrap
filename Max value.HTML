<html>
    <head>
        <title>Max value</title>
    </head>
    <body>
        
        <script>
          function findMax(){
            var i;
            var max=0;
            for(i=0;i<arguments.length;i++){
                if(arguments[i]>max){
                    max=arguments[i];
                }
            }
            return max;
          }
          document.write(findMax(4,7,10));       </script>
    </body>
</html>
